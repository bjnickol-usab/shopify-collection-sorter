name = "Collection Sorter"
client_id = "YOUR_SHOPIFY_CLIENT_ID"
application_url = "https://shopify-collection-sorter.vercel.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_collections,write_collections,read_inventory,read_locations"

[auth]
redirect_urls = [
  "https://shopify-collection-sorter.vercel.app/auth/callback",
  "https://shopify-collection-sorter.vercel.app/auth/shopify/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback"
]

[webhooks]
api_version = "2025-01"

[pos]
embedded = false
